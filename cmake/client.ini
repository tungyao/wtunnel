[client]
; Local HTTP proxy listen port
local_port = 8080

; Tunnel server address
tunnel_host = cs.proxyany.top
tunnel_port = 443

; REALITY pre-shared key (must match server)
reality_psk = 123123123

; Wireshark Client Hello text dump for TLS fingerprint
fingerprint_path = /etc/wtunnel/chrome146.txt

; Clash Rule-Set file for proxy domains (local file or http(s) URL)
; Domains matching this list go through the tunnel; unmatched domains bypass.
; proxy_domains_file = /etc/wtunnel/proxy.txt
; proxy_domains_file = https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt

; Verbose level: 0=error, 1=info, 2=debug
verbose = 1
